name: flutter_http_watcher
description: A lightweight in-app network inspector for Flutter. Floating draggable button with full request/response viewer. Works with any HTTP client.
version: 1.2.1
repository: https://github.com/allaithsaad/flutter_http_watcher
topics:
  - network
  - http
  - debugging
  - inspector
  - developer-tools

environment:
  sdk: ^3.10.0
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  share_plus: ^13.1.0
  path_provider: ^2.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

